<!-- Hero-sektion — første ting besøgende ser -->
<section id="top" class="hero">
  <div class="hero-content fade-in">
    <!-- Rediger tagline herunder -->
    <p class="hero-eyebrow">Lokal hjælp — hurtigt og pålideligt</p>
    <h1 class="hero-heading">Vi gør det<br>du ikke gider</h1>
    <p class="hero-sub">
      Vinduesvask og græsslåning i {{ .Site.Params.addressLocality }} og omegn.<br>
      Ingen ventetid — bare ring og vi kommer.
    </p>
    <a href="#kontakt" class="btn btn-primary">Bestil i dag</a>
  </div>

  <!-- Dekorativ grøn bølge i bunden af hero -->
  <div class="hero-wave" aria-hidden="true">
    <svg viewBox="0 0 1440 80" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,40 C360,80 1080,0 1440,40 L1440,80 L0,80 Z" fill="#f5f9f0"/>
    </svg>
  </div>
</section>
