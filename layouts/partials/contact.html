<!-- Kontakt — Netlify Forms formular -->
<section id="kontakt" class="section contact">
  <div class="container contact-grid">

    <div class="contact-text fade-in">
      <h2 class="section-title">Skriv til os</h2>
      <p>
        Fortæl os hvad du har brug for, og vi vender tilbage inden for
        24 timer — oftest meget hurtigere.
      </p>
      <ul class="contact-list">
        <!-- Opdater e-mail i hugo.toml -->
        <li>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <a href="mailto:{{ .Site.Params.email }}">{{ .Site.Params.email }}</a>
        </li>
      </ul>
    </div>

    <!-- Netlify Forms: netlify-attributten aktiverer automatisk opsamling -->
    <form
      name="kontakt"
      method="POST"
      data-netlify="true"
      netlify-honeypot="bot-field"
      class="contact-form fade-in"
    >
      <!-- Skjulte felter krævet af Netlify Forms -->
      <input type="hidden" name="form-name" value="kontakt" />
      <p class="hidden"><label>Lad dette felt stå tomt: <input name="bot-field" /></label></p>

      <!-- Navn -->
      <div class="form-group">
        <label for="navn">Navn</label>
        <input
          type="text"
          id="navn"
          name="navn"
          placeholder="Dit navn"
          required
          autocomplete="name"
        />
      </div>

      <!-- Besked -->
      <div class="form-group">
        <label for="besked">Besked</label>
        <textarea
          id="besked"
          name="besked"
          rows="5"
          placeholder="Hvad kan vi hjælpe dig med? (adresse, ydelse, ønsket tidspunkt...)"
          required
        ></textarea>
      </div>

      <button type="submit" class="btn btn-primary btn-full">Send besked</button>
    </form>

  </div>
</section>
